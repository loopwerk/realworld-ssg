{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    {{ with .Params.author }}<p>By {{ . }}</p>{{ end }}
    {{ with .Params.tags }}
    <ul class="tags">
        {{ range . }}<li><a href="/articles/tags/{{ . | urlize }}/">{{ . }}</a></li>{{ end }}
    </ul>
    {{ end }}
    <div>
        {{ .Content }}
    </div>
</article>
{{ end }}
